<html lang="en">

    <meta name="description" content="PulseHQ transforms your raw commit history into a living intelligence dashboard. See when you build best, what needs attention, and how your team moves." />

    <!-- Open Graph -->
    <meta property="og:title" content="PulseHQ — Git Analytics for Developers" />
    <meta property="og:description" content="See your code the way data does." />
